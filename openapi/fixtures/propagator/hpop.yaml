schema_version: 1
endpoint: /Propagator/HPOP
method: POST
openapi_operation_id: null
openapi_request_schema: EntityPositionHPOP
openapi_response_schema: CzmlPositionOut
branches:
  nominal:
    request: &hpop_common_request
      Start: "2024-01-01T00:00:00.000Z"
      Stop: "2024-01-01T00:10:00.000Z"
      OrbitEpoch: "2024-01-01T00:00:00.000Z"
      CoordSystem: Inertial
      CoordType: Classical
      OrbitalElements:
        - 6678137.0
        - 0.0
        - 28.5
        - 0.0
        - 0.0
        - 0.0
      HpopPropagator:
        Name: Earth_HPOP
        CentralBodyName: Earth
        GravityModel: &hpop_twobody_gravity
          $type: TwoBody
          Name: EarthTwoBody
          Mu: 398600441500000.0
    expect: &czml_position_out_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - Period
          - Position
        fields:
          IsSuccess:
            kind: json_boolean
          Message:
            kind: json_string
          Period:
            kind: json_number
          Position:
            kind: json_object
            required_fields:
              - CentralBody
              - cartesianVelocity
              - epoch
              - interpolationAlgorithm
              - interpolationDegree
              - referenceFrame
            fields:
              CentralBody:
                kind: json_string
              cartesianVelocity:
                kind: json_array
                min_length: 1
                items:
                  kind: json_number
              epoch:
                kind: json_string
              interpolationAlgorithm:
                kind: json_string
              interpolationDegree:
                kind: json_number
              referenceFrame:
                kind: json_string
  numerical_integrator_rkf7th8th:
    request:
      <<: *hpop_common_request
      HpopPropagator:
        Name: Earth_HPOP
        CentralBodyName: Earth
        NumericalIntegrator:
          $type: RKF7th8th
          Name: RKF7th8th
          InitialStep: 60.0
          MaxStep: 300.0
        GravityModel: *hpop_twobody_gravity
    expect: *czml_position_out_expect
  gravity_model_gravity_field:
    request:
      <<: *hpop_common_request
      HpopPropagator:
        Name: Earth_HPOP
        CentralBodyName: Earth
        GravityModel:
          $type: GravityField
          Name: EarthGravityField
          GravityFileName: EGM2008.grv
          Degree: 2
          Order: 2
    expect: *czml_position_out_expect
  gravity_model_twobody:
    request: *hpop_common_request
    expect: *czml_position_out_expect
  atmospheric_model_jacchia_roberts:
    request:
      <<: *hpop_common_request
      HpopPropagator:
        Name: Earth_HPOP
        CentralBodyName: Earth
        GravityModel: *hpop_twobody_gravity
        AtmosphericModel:
          $type: JacchiaRoberts
          Name: JacchiaRoberts
          F10p7: 150.0
          F10p7Avg: 150.0
          Kp: 3.0
    expect: *czml_position_out_expect
  srp_model_spherical:
    request:
      <<: *hpop_common_request
      HpopPropagator: &hpop_srp_apparent_dual_cone
        Name: Earth_HPOP
        CentralBodyName: Earth
        GravityModel: *hpop_twobody_gravity
        SRPModel:
          $type: SRPSpherical
          Name: SRPSpherical
          ShadowModel: DualCone
          SunPosition: Apparent
          EclipsingBodies:
            - Earth
            - Moon
    expect: *czml_position_out_expect
  srp_shadow_model_dual_cone:
    request:
      <<: *hpop_common_request
      HpopPropagator: *hpop_srp_apparent_dual_cone
    expect: *czml_position_out_expect
  srp_shadow_model_cylindrical:
    request:
      <<: *hpop_common_request
      HpopPropagator:
        Name: Earth_HPOP
        CentralBodyName: Earth
        GravityModel: *hpop_twobody_gravity
        SRPModel:
          $type: SRPSpherical
          Name: SRPSpherical
          ShadowModel: Cylindrical
          SunPosition: Apparent
          EclipsingBodies:
            - Earth
            - Moon
    expect: *czml_position_out_expect
  srp_sun_position_true:
    request:
      <<: *hpop_common_request
      HpopPropagator:
        Name: Earth_HPOP
        CentralBodyName: Earth
        GravityModel: *hpop_twobody_gravity
        SRPModel:
          $type: SRPSpherical
          Name: SRPSpherical
          ShadowModel: DualCone
          SunPosition: "True"
          EclipsingBodies:
            - Earth
            - Moon
    expect: *czml_position_out_expect

schema_version: 1
endpoint: /Lighting/SolarAER
method: POST
openapi_operation_id: null
openapi_request_schema: SolarAERInput
openapi_response_schema: SolarAEROut
branches:
  nominal:
    state: verified
    request:
      Start: '2024-01-01T00:00:00.000Z'
      Stop: '2024-01-01T01:00:00.000Z'
      TimeStepSec: 1800
      sitePosition:
        CentralBody: Earth
        cartographicDegrees:
          - 120.0
          - 31.0
          - 10.0
    expect:
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - Datas
        fields:
          IsSuccess:
            kind: json_boolean
          Message:
            kind: json_string
          Datas:
            kind: json_array
            min_length: 1
            items:
              kind: json_object
              required_fields:
                - Time
                - Azimuth
                - Elevation
                - Range
              fields:
                Time:
                  kind: json_string
                Azimuth:
                  kind: json_number
                Elevation:
                  kind: json_number
                Range:
                  kind: json_number

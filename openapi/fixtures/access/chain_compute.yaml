schema_version: 1
endpoint: /access/ChainCompute
method: POST
openapi_operation_id: ChainCompute
openapi_request_schema: ChainInput
openapi_response_schema: ChainOutput
branches:
  nominal:
    request:
      <<: &chain_2024_window
        Start: "2024-01-01T00:00:00.000Z"
        Stop: "2024-01-02T00:00:00.000Z"
      AllObjects:
        - &site_entity_path
          $type: EntityPath
          Name: Facility/Phase3Site
          Position: &site_position
            $type: SitePosition
            CentralBody: Earth
            cartographicDegrees:
              - 120.0
              - 31.0
              - 10.0
        - &j2_entity_path
          $type: EntityPath
          Name: Satellite/Phase3To
          Position: &j2_position
            $type: J2
            Step: 120.0
            OrbitEpoch: "2024-01-01T00:00:00.000Z"
            OrbitalElements:
              - 6778137.0
              - 0.001
              - 51.6
              - 0.0
              - 0.0
              - 0.0
      StartObject: Facility/Phase3Site
      EndObject: Satellite/Phase3To
    expect: &chain_success_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - ComputedStrands
          - CompleteChainAccess
          - IndividualStrandAccess
          - IndividualObjectAccess
        fields:
          IsSuccess:
            kind: json_boolean
          Message:
            kind: json_string
          ComputedStrands:
            kind: json_array
            min_length: 1
            items:
              kind: json_array
              min_length: 1
              items:
                kind: json_string
          CompleteChainAccess:
            kind: json_array
            min_length: 1
            items: &time_interval
              kind: json_object
              required_fields:
                - Start
                - Stop
                - Duration
              fields:
                Start:
                  kind: json_string
                Stop:
                  kind: json_string
                Duration:
                  kind: json_number
          IndividualStrandAccess:
            kind: json_object
          IndividualObjectAccess:
            kind: json_object
  entity_path_group_failure_shape:
    request:
      <<: *chain_2024_window
      AllObjects:
        - *site_entity_path
        - $type: EntityPathGroup
          Name: Group/Targets
          AssignedObjects:
            - Name: Satellite/Phase3To
              Position: *j2_position
      StartObject: Facility/Phase3Site
      EndObject: Group/Targets
    expect: &chain_failure_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
        fields:
          IsSuccess:
            kind: json_boolean
            const: false
          Message:
            kind: json_string
  use_light_time_delay_true:
    request:
      <<: *chain_2024_window
      UseLightTimeDelay: true
      AllObjects:
        - *site_entity_path
        - *j2_entity_path
      StartObject: Facility/Phase3Site
      EndObject: Satellite/Phase3To
    expect: *chain_success_expect
  allobjects_position_twobody:
    request:
      <<: *chain_2024_window
      AllObjects:
        - *site_entity_path
        - <<: *j2_entity_path
          Name: Satellite/Phase3TwoBody
          Position: &two_body_position
            $type: TwoBody
            Step: 120.0
            OrbitEpoch: "2024-01-01T00:00:00.000Z"
            OrbitalElements:
              - 6778137.0
              - 0.001
              - 51.6
              - 0.0
              - 0.0
              - 0.0
      StartObject: Facility/Phase3Site
      EndObject: Satellite/Phase3TwoBody
    expect: *chain_success_expect
  allobjects_position_sgp4:
    request:
      Start: "2021-05-01T00:00:00.000Z"
      Stop: "2021-05-02T00:00:00.000Z"
      AllObjects:
        - *site_entity_path
        - <<: *j2_entity_path
          Name: Satellite/Phase3Sgp4
          Position: &sgp4_position
            $type: SGP4
            Step: 120.0
            TLEs:
              - 1 25544U 98067A   21120.54791667  .00001391  00000-0  33245-4 0  9993
              - 2 25544  51.6443 206.1695 0002829  89.9572  27.6891 15.48915315281553
      StartObject: Facility/Phase3Site
      EndObject: Satellite/Phase3Sgp4
    expect: *chain_success_expect
  allobjects_position_astrogator_mcs:
    request:
      <<: *chain_2024_window
      AllObjects:
        - *site_entity_path
        - <<: *j2_entity_path
          Name: Satellite/Phase10ChainAstrogatorMCS
          Position: &astrogator_mcs_position
            $type: AstrogatorMCS
            ComputeCzmlPositions: true
            MainSequence:
              - $type: InitialState
                Name: Initial
                InitialState:
                  Epoch: "2024-01-01T00:00:00Z"
                  CoordSystemName: Earth Inertial
                  Element:
                    $type: Cartesian
                    X: 6678137.0
                    Vy: 7726.67
              - $type: Propagate
                Name: Propagate
                PropagatorName: FixturePropagator
                StopConditions:
                  - $type: Duration
                    Name: Duration
                    Trip: 600.0
                MaxPropagationTime: 900
            Propagators:
              - Name: FixturePropagator
                CentralBodyName: Earth
                NumericalIntegrator:
                  $type: RKF7th8th
                  Name: RKF7th8th
                GravityModel:
                  $type: TwoBody
                  Name: EarthTwoBody
                  Mu: 398600441800000.0
      StartObject: Facility/Phase3Site
      EndObject: Satellite/Phase10ChainAstrogatorMCS
    expect: &chain_success_allow_empty_access_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - ComputedStrands
          - CompleteChainAccess
          - IndividualStrandAccess
          - IndividualObjectAccess
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          ComputedStrands:
            kind: json_array
            min_length: 1
            items:
              kind: json_array
              min_length: 1
              items:
                kind: json_string
          CompleteChainAccess:
            kind: json_array
          IndividualStrandAccess:
            kind: json_object
          IndividualObjectAccess:
            kind: json_object
  allobjects_position_hpop:
    request:
      <<: *chain_2024_window
      AllObjects:
        - *site_entity_path
        - <<: *j2_entity_path
          Name: Satellite/Phase10ChainHPOP
          Position: &hpop_position
            $type: HPOP
            Start: "2024-01-01T00:00:00.000Z"
            Stop: "2024-01-01T00:10:00.000Z"
            OrbitEpoch: "2024-01-01T00:00:00.000Z"
            CoordSystem: Inertial
            CoordType: Classical
            OrbitalElements:
              - 6678137.0
              - 0.0
              - 28.5
              - 0.0
              - 0.0
              - 0.0
            HpopPropagator:
              Name: Earth_HPOP
              CentralBodyName: Earth
              GravityModel:
                $type: TwoBody
                Name: EarthTwoBody
                Mu: 398600441500000.0

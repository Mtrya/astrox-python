              - 6644774.1312973
              - 666701.233545599
              - 0.0
              - -771.3798654025477
              - 7688.068833728764
              - 0.0
              - 120.0
              - 6545018.875944976
              - 1326741.0087477376
              - 0.0
              - -1535.0523581742757
              - 7572.651025008587
              - 0.0

        <<: *site_object
    expect: &access_empty_passes_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - Passes
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          Passes:
            kind: json_array

      MainSequence:
        - *initial_state_segment
        - $type: Propagate
          Name: Propagate
          PropagatorName: FixturePropagator
          StopConditions:
            - *duration_stop_condition
          MaxPropagationTime: 120
      Propagators:
        - <<: *two_body_propagator
          SRPModel:
            $type: SRPSpherical
            Name: SRPSpherical
            ShadowModel: DualCone
            SunPosition: Apparent
            EclipsingBodies:
              - Earth
              - Moon
    expect: *run_mcs_sequence_type_success_expect
  engine_model_const_acc:
    request:
      <<: *run_mcs_initial_request
      EngineModels:
        - $type: EngineConstAcc
          Name: FixtureEngine
          Acceleration: 0.5
          Isp: 300.0
          g: 9.80665
    expect: *run_mcs_sequence_type_success_expect
  engine_model_constant:
    request:
      <<: *run_mcs_initial_request
      EngineModels:
        - $type: EngineConstant
          Name: FixtureEngine
          Thrust: 500.0
          Isp: 300.0
          g: 9.80665
    expect: *run_mcs_sequence_type_success_expect
  compute_czml_positions_true:
    request:
      <<: *run_mcs_initial_request
      ComputeCzmlPositions: true
    expect:
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - MainSequenceResults
          - Positions
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          MainSequenceResults:
            kind: json_array
            min_length: 1
            items:
              kind: json_object
          Positions:
            kind: json_object
            required_fields:
              - CentralBody
              - CzmlPositions
            fields:
              CentralBody:
                kind: json_string
              CzmlPositions:
                kind: json_array
  state_element_keplerian:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - $type: InitialState
          Name: Initial
          InitialState:
            Epoch: "2024-01-01T00:00:00Z"
            CoordSystemName: Earth Inertial
            Element:
              $type: Keplerian
              GravitationalParameter: 398600441800000.0
              SemiMajorAxis: 6678137.0
              Eccentricity: 0.001
              Inclination: 28.5
              RAAN: 0.0
              ArgOfPeriapsis: 0.0
              TrueAnomaly: 0.0
    expect: *run_mcs_initial_success_expect
  state_element_spherical:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - $type: InitialState
          Name: Initial
          InitialState:
            Epoch: "2024-01-01T00:00:00Z"
            CoordSystemName: Earth Inertial
            Element:
              $type: Spherical
              RightAscension: 0.0
              Declination: 0.0
              RadiusMagnitude: 6678137.0
              HorizFPA: 0.0
              VelocityAzimuth: 90.0
              VelocityMagnitude: 7726.67
    expect: *run_mcs_initial_success_expect
  result_duration:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - <<: *initial_state_segment
          Results:
            - $type: Duration
              Name: DurationResult
    expect: &run_mcs_result_success_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - MainSequenceResults
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          MainSequenceResults:
            kind: json_array
            min_length: 1
            items:
              kind: json_object
              required_fields:
                - TypeName
                - Name
                - Results
              fields:
                TypeName:
                  kind: json_string
                Name:
                  kind: json_string
                Results:
                  kind: json_object
  result_epoch:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - <<: *initial_state_segment
          Results:
            - $type: Epoch
              Name: EpochResult
    expect: *run_mcs_result_success_expect
  result_relative:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - <<: *initial_state_segment
          Results:
            - $type: Relative
              Name: RelativeDuration
              CalcObject:
                $type: Duration
                Name: DurationResult
              ReferenceName: Reference
    expect: *run_mcs_result_success_expect
  result_cartographic:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - <<: *initial_state_segment
          Results:
            - $type: Cartographic
              Name: Latitude
              ComponentName: Latitude
              CentralBodyName: Earth
    expect: *run_mcs_result_success_expect
  result_spherical_element:
    request:

schema_version: 1
endpoint: /Astrogator/RunMCS
method: POST
openapi_operation_id: null
openapi_request_schema: AstrogatorMCS
openapi_response_schema: MCSOutput
branches:
  nominal:
    request: &run_mcs_initial_request
      MainSequence:
        - &initial_state_segment
          $type: InitialState
          Name: Initial
          InitialState:
            Epoch: "2024-01-01T00:00:00Z"
            CoordSystemName: Earth Inertial
            Element:
              $type: Cartesian
              X: 6678137.0
              Vy: 7726.67
      ComputeCzmlPositions: false
    expect:
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - MainSequenceResults
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          MainSequenceResults:
            kind: json_array
            min_length: 1
            items:
              kind: json_object
              required_fields:
                - TypeName
                - Name
                - InitialState
                - FinalState
                - DurationSec
                - Results
              fields:
                TypeName:
                  kind: json_string
                Name:
                  kind: json_string
                InitialState: &mcs_state
                  kind: json_object
                  required_fields:
                    - Epoch
                    - CoordSystemName
                    - Cartesian
                    - Keplerian
                    - Spherical
                  fields:
                    Epoch:
                      kind: json_string
                    CoordSystemName:
                      kind: json_string
                    Cartesian:
                      kind: json_object
                      required_fields:
                        - X
                        - Y
                        - Z
                        - Vx
                        - Vy
                        - Vz
                      fields:
                        X:
                          kind: json_number
                        Y:
                          kind: json_number
                        Z:
                          kind: json_number
                        Vx:
                          kind: json_number
                        Vy:
                          kind: json_number
                        Vz:
                          kind: json_number
                    Keplerian:
                      kind: json_object
                    Spherical:
                      kind: json_object
                FinalState: *mcs_state
                DurationSec:
                  kind: json_number
                Results:
                  kind: json_object
  sequence_type_sequence:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - $type: Sequence
          Name: Sequence
          Segments:
            - *initial_state_segment
    expect: &run_mcs_sequence_type_success_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - MainSequenceResults
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          MainSequenceResults:
            kind: json_array
            min_length: 1
            items:
              kind: json_object
              required_fields:
                - TypeName
                - Name
              fields:
                TypeName:
                  kind: json_string
                Name:
                  kind: json_string
  sequence_type_maneuver_impulsive:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - *initial_state_segment
        - $type: ManeuverImpulsive
          Name: Impulse
          PropulsionMethodValue: EngineModel
          AttitudeControl:
            $type: VelocityVector
            DeltaVMagnitude: 1.0
    expect: *run_mcs_sequence_type_success_expect
  sequence_type_propagate:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - *initial_state_segment
        - $type: Propagate
          Name: Propagate
          PropagatorName: FixturePropagator
          StopConditions:
            - &duration_stop_condition
              $type: Duration
              Name: Duration
              Trip: 60.0
          MaxPropagationTime: 120
      Propagators:
        - &two_body_propagator
          Name: FixturePropagator
          CentralBodyName: Earth
          NumericalIntegrator:
            $type: RKF7th8th
            Name: RKF7th8th
          GravityModel:
            $type: TwoBody
            Name: EarthTwoBody
            Mu: 398600441800000.0
    expect: *run_mcs_sequence_type_success_expect
  sequence_type_maneuver_finite:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - *initial_state_segment
        - $type: ManeuverFinite
          Name: Finite
          PropagatorName: FixturePropagator
          StopConditions:
            - *duration_stop_condition
          PropulsionMethodValue: FixtureEngine
          AttitudeControl:
            $type: VelocityVector
          MaxPropagationTime: 120
      Propagators:
        - *two_body_propagator
      EngineModels:
        - $type: EngineConstant
          Name: FixtureEngine
          Thrust: 500.0
          Isp: 300.0
    expect: *run_mcs_sequence_type_success_expect
  sequence_type_stop:
    request:
      <<: *run_mcs_initial_request
      MainSequence:
        - *initial_state_segment
        - $type: Stop
          Name: Stop
    expect: *run_mcs_sequence_type_success_expect

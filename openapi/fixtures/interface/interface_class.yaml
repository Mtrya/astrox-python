schema_version: 1
endpoint: /InterfaceClass
method: POST
openapi_operation_id: null
openapi_request_schema: InterfaceInput
openapi_response_schema: string
branches:
  finite_attitude_euler_angles:
    request:
      AgVAAttitudeControlFiniteAttitude:
        CoordType: EulerAngles
        RefAxesName: VNC(Earth)
        A: 0.0
        B: 0.0
        C: 0.0
        Sequence: "313"
    expect: &validation_problem_expect
      status: 400
      content_type: application/problem+json
      response:
        kind: json_object
        required_fields:
          - type
          - title
          - status
          - errors
        fields:
          type:
            kind: json_string
          title:
            kind: json_string
          status:
            kind: json_number
            const: 400
          errors:
            kind: json_object
  finite_attitude_quaternion:
    request:
      AgVAAttitudeControlFiniteAttitude:
        CoordType: Quaternion
        RefAxesName: VNC(Earth)
        QX: 0.0
        QY: 0.0
        QZ: 0.0
        QS: 1.0
    expect: *validation_problem_expect
  finite_thrust_vector_cartesian:
    request:
      AgVAAttitudeControlFiniteThrustVector:
        CoordType: Cartesian
        ThrustAxesName: VNC(Earth)
        X: 1.0
        Y: 0.0
        Z: 0.0
    expect: *validation_problem_expect
  finite_thrust_vector_spherical:
    request:
      AgVAAttitudeControlFiniteThrustVector:
        CoordType: Spherical
        ThrustAxesName: VNC(Earth)
        Azimuth: 0.0
        Elevation: 0.0
    expect: *validation_problem_expect
  impulsive_attitude_euler_angles:
    request:
      AgVAAttitudeControlImpulsiveAttitude:
        DeltaVMagnitude: 1.0
        CoordType: EulerAngles
        RefAxesName: VNC(Earth)
        A: 0.0
        B: 0.0
        C: 0.0
        Sequence: "313"
    expect: *validation_problem_expect
  impulsive_attitude_quaternion:
    request:
      AgVAAttitudeControlImpulsiveAttitude:
        DeltaVMagnitude: 1.0
        CoordType: Quaternion
        RefAxesName: VNC(Earth)
        QX: 0.0
        QY: 0.0
        QZ: 0.0
        QS: 1.0
    expect: *validation_problem_expect
  impulsive_thrust_vector_cartesian:
    request:
      AgVAAttitudeControlImpulsiveThrustVector:
        CoordType: Cartesian
        ThrustAxesName: VNC(Earth)
        Magnitude: 1.0
        X: 1.0
        Y: 0.0
        Z: 0.0
    expect: *validation_problem_expect
  impulsive_thrust_vector_spherical:
    request:
      AgVAAttitudeControlImpulsiveThrustVector:
        CoordType: Spherical
        ThrustAxesName: VNC(Earth)
        Magnitude: 1.0
        Azimuth: 0.0
        Elevation: 0.0
    expect: *validation_problem_expect
  finite_type_anti_velocity_vector:
    request:
      agVAMCSManeuverFinite: &finite_maneuver_request
        AttitudeControl:
          $type: AntiVelocityVector
          AttitudeUpdate: DuringBurn
        PropagatorName: propagator
        StopConditions:
          - &duration_stop_condition
            $type: Duration
            Trip: 60.0
        PropulsionMethodValue: Constant_Thrust_Isp
        Name: finite-maneuver
    expect: *validation_problem_expect
  finite_type_attitude:
    request:
      agVAMCSManeuverFinite:
        <<: *finite_maneuver_request
        AttitudeControl:
          $type: Attitude
          CoordType: Quaternion
          RefAxesName: VNC(Earth)
          QX: 0.0
          QY: 0.0
          QZ: 0.0
          QS: 1.0
    expect: *validation_problem_expect
  finite_type_velocity_vector:
    request:
      agVAMCSManeuverFinite:
        <<: *finite_maneuver_request
        AttitudeControl:
          $type: VelocityVector
          AttitudeUpdate: DuringBurn
    expect: *validation_problem_expect
  finite_type_thrust_vector:
    request:
      agVAMCSManeuverFinite:
        <<: *finite_maneuver_request
        AttitudeControl:
          $type: ThrustVector
          CoordType: Cartesian
          ThrustAxesName: VNC(Earth)
          X: 1.0
          Y: 0.0
          Z: 0.0
    expect: *validation_problem_expect
  impulsive_type_anti_velocity_vector:
    request:
      agVAMCSManeuverImpulsive: &impulsive_maneuver_request
        AttitudeControl:
          $type: AntiVelocityVector
          DeltaVMagnitude: 1.0
        PropulsionMethodValue: Impulsive
        Name: impulsive-maneuver
    expect: *validation_problem_expect
  impulsive_type_attitude:
    request:
      agVAMCSManeuverImpulsive:
        <<: *impulsive_maneuver_request
        AttitudeControl:
          $type: Attitude
          DeltaVMagnitude: 1.0
          CoordType: Quaternion
          RefAxesName: VNC(Earth)
          QX: 0.0
          QY: 0.0
          QZ: 0.0
          QS: 1.0
    expect: *validation_problem_expect
  impulsive_type_velocity_vector:
    request:
      agVAMCSManeuverImpulsive:
        <<: *impulsive_maneuver_request
        AttitudeControl:
          $type: VelocityVector
          DeltaVMagnitude: 1.0
    expect: *validation_problem_expect
  impulsive_type_thrust_vector:
    request:
      agVAMCSManeuverImpulsive:
        <<: *impulsive_maneuver_request
        AttitudeControl:
          $type: ThrustVector
          CoordType: Cartesian
          ThrustAxesName: VNC(Earth)
          Magnitude: 1.0
          X: 1.0
          Y: 0.0
          Z: 0.0
    expect: *validation_problem_expect
  stopping_condition_apoapsis:
    request:
      agVAMCSPropagate:
        PropagatorName: propagator
        StopConditions:
          - $type: Apoapsis
            CentralBodyName: Earth
            Mu: 398600441800000.0
        Name: propagate
    expect: *validation_problem_expect
  stopping_condition_duration:
    request:
      agVAMCSPropagate:
        PropagatorName: propagator
        StopConditions:
          - *duration_stop_condition
        Name: propagate
    expect: *validation_problem_expect
  stopping_condition_epoch:
    request:
      agVAMCSPropagate:
        PropagatorName: propagator
        StopConditions:
          - $type: Epoch
            Trip: "2024-01-01T00:10:00.000Z"
        Name: propagate
    expect: *validation_problem_expect
  stopping_condition_periapsis:
    request:
      agVAMCSPropagate:
        PropagatorName: propagator
        StopConditions:
          - $type: Periapsis
            CentralBodyName: Earth
            Mu: 398600441800000.0
        Name: propagate
    expect: *validation_problem_expect
  stopping_condition_scalar:
    request:
      agVAMCSPropagate:
        PropagatorName: propagator
        StopConditions:
          - $type: Scalar
            Trip: 1.0
            UserCalcObject: &calc_scalar_duration
              $type: Duration
              Name: duration
        Name: propagate
    expect: *validation_problem_expect
  state_element_cartesian:
    request:
      agVAMCSInitialState:
        InitialState:
          Epoch: "2024-01-01T00:00:00Z"
          CoordSystemName: Earth Inertial
          Element:
            $type: Cartesian
            X: 7000000.0
            Y: 0.0
            Z: 0.0
            Vx: 0.0
            Vy: 7500.0
            Vz: 0.0
        Name: initial-state
    expect: *validation_problem_expect
  state_element_keplerian:
    request:
      agVAMCSInitialState:
        InitialState:
          Epoch: "2024-01-01T00:00:00Z"
          CoordSystemName: Earth Inertial
          Element:
            $type: Keplerian
            ElementType: Osculating
            GravitationalParameter: 398600441800000.0
            SemiMajorAxis: 7000000.0
            Eccentricity: 0.001
            Inclination: 98.0
            RAAN: 0.0
            ArgOfPeriapsis: 0.0
            TrueAnomaly: 0.0
            AnomalyType: "True"
        Name: initial-state
    expect: *validation_problem_expect
  state_element_spherical:
    request:
      agVAMCSInitialState:
        InitialState:
          Epoch: "2024-01-01T00:00:00Z"
          CoordSystemName: Earth Inertial
          Element:
            $type: Spherical
            RightAscension: 0.0
            Declination: 0.0
            RadiusMagnitude: 7000000.0
            HorizFPA: 0.0
            VelocityAzimuth: 90.0
            VelocityMagnitude: 7500.0
        Name: initial-state
    expect: *validation_problem_expect
  calc_scalar_b_plane:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: BPlane
          ComponentName: BDotR
          Mu: 398600441800000.0
          CentralBodyName: Earth
          Name: b-plane
    expect: *validation_problem_expect
  calc_scalar_cartographic:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: Cartographic
          ComponentName: Latitude
          CentralBodyName: Earth
          Name: cartographic
    expect: *validation_problem_expect
  calc_scalar_delta_spherical:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: DeltaSpherical
          ComponentName: Delta_Declination
          CentralBodyName: Moon
          ParentCbName: Earth
          Name: delta-spherical
    expect: *validation_problem_expect
  calc_scalar_duration:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject: *calc_scalar_duration
    expect: *validation_problem_expect
  calc_scalar_epoch:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: Epoch
          Name: epoch
    expect: *validation_problem_expect
  calc_scalar_keplerian_element:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: KeplerianElement
          ComponentName: SemimajorAxis
          Mu: 398600441800000.0
          CoordSystemName: Earth Inertial
          Name: keplerian-element
    expect: *validation_problem_expect
  calc_scalar_modified_keplerian_element:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: ModifiedKeplerianElement
          ComponentName: SemimajorAxis
          Mu: 398600441800000.0
          CoordSystemName: Earth Inertial
          Name: modified-keplerian-element
    expect: *validation_problem_expect
  calc_scalar_point_element:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: PointElement
          ComponentName: X
          CoordSystemName: Earth Inertial
          Name: point-element
    expect: *validation_problem_expect
  calc_scalar_relative:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: Relative
          CalcObject: *calc_scalar_duration
          ReferenceName: reference
          Name: relative
    expect: *validation_problem_expect
  calc_scalar_spherical_element:
    request:
      agVAScalarStoppingCondition:
        Trip: 1.0
        UserCalcObject:
          $type: SphericalElement
          ComponentName: RadiusMagnitude
          CoordSystemName: Earth Inertial
          Name: spherical-element
    expect: *validation_problem_expect

schema_version: 1
endpoint: /celestial/ephemeris
method: POST
openapi_operation_id: ephermeris
openapi_request_schema: EphemerisInput
openapi_response_schema: CzmlPositionOut
branches:
  nominal:
    request: &ephemeris_common_request
      TargetName: Mars
      ObserverName: Sun
      ObserverFrame: MeanEclpJ2000
      Start: "2024-01-01T00:00:00Z"
      Stop: "2024-01-03T00:00:00Z"
      Step: 86400.0
    expect: &czml_position_out_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - Period
          - Position
        fields:
          IsSuccess:
            kind: json_boolean
          Message:
            kind: json_string
          Period:
            kind: json_number
          Position:
            kind: json_object
            required_fields:
              - CentralBody
              - cartesianVelocity
              - epoch
              - interpolationAlgorithm
              - interpolationDegree
              - interval
              - referenceFrame
            fields:
              CentralBody:
                kind: json_string
              cartesianVelocity:
                kind: json_array
                min_length: 1
                items:
                  kind: json_number
              epoch:
                kind: json_string
              interpolationAlgorithm:
                kind: json_string
              interpolationDegree:
                kind: json_number
              interval:
                kind: json_string
              referenceFrame:
                kind: json_string
  observer_frame_fixed:
    request:
      <<: *ephemeris_common_request
      ObserverFrame: FIXED
    expect: *czml_position_out_expect
  observer_frame_inertial:
    request:
      <<: *ephemeris_common_request
      ObserverFrame: INERTIAL
    expect: *czml_position_out_expect
  observer_frame_mean_eclp_j2000:
    request: *ephemeris_common_request
    expect: *czml_position_out_expect
  observer_frame_j2000:
    request:
      <<: *ephemeris_common_request
      ObserverFrame: J2000
    expect: *czml_position_out_expect

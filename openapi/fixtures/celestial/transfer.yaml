schema_version: 1
endpoint: /celestial/transfer
method: POST
openapi_operation_id: null
openapi_request_schema: PlanetTransferInput
openapi_response_schema: PlanetTransferOutput
branches:
  nominal:
    request: &transfer_common_request
      SunFrameName: MeanEclpJ2000
      DepartureCbName: Earth
      ArrivalCbName: Mars
      DepartureInterval: "2028-06-01T00:00:00Z/2028-06-01T00:00:00Z"
      ArrivalInterval: "2029-04-10T00:00:00Z/2029-04-10T00:00:00Z"
      MinTofDays: 10
      DepartureStepDay: 1.0
      ArrivalStepDay: 1.0
    expect: &transfer_success_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - TransferResults
        fields:
          IsSuccess:
            kind: json_boolean
          Message:
            kind: json_string
          TransferResults:
            kind: json_array
            min_length: 1
            items:
              kind: json_object
              required_fields:
                - ArrivalTime
                - DV1_Mag
                - DV2_Mag
                - DeltaV1
                - DeltaV2
                - DepartureTime
                - RV1
                - RV2
              fields:
                ArrivalTime:
                  kind: json_string
                DV1_Mag:
                  kind: json_number
                DV2_Mag:
                  kind: json_number
                DeltaV1:
                  kind: json_array
                  min_length: 1
                  items:
                    kind: json_number
                DeltaV2:
                  kind: json_array
                  min_length: 1
                  items:
                    kind: json_number
                DepartureTime:
                  kind: json_string
                RV1:
                  kind: json_array
                  min_length: 1
                  items:
                    kind: json_number
                RV2:
                  kind: json_array
                  min_length: 1
                  items:
                    kind: json_number
  sun_frame_icrf:
    request:
      <<: *transfer_common_request
      SunFrameName: ICRF
    expect: *transfer_success_expect

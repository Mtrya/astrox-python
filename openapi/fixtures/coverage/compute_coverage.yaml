schema_version: 1
endpoint: /Coverage/ComputeCoverage
method: POST
openapi_operation_id: null
openapi_request_schema: CoverageInput
openapi_response_schema: CoverageOutput
branches:
  nominal:
    request: &compute_coverage_base_request
      Start: "2024-01-01T00:00:00.000Z"
      Stop: "2024-01-01T01:00:00.000Z"
      Step: 120.0
      Grid:
        $type: LatitudeBounds
        MinLatitude: -30.0
        MaxLatitude: 30.0
        Resolution: 30.0
        Height: 0.0
      Assets:
        - &compute_coverage_j2_asset
          Name: Satellite/CoverageProbeJ2
          Position:
            $type: J2
            Start: "2024-01-01T00:00:00.000Z"
            Stop: "2024-01-01T01:00:00.000Z"
            Step: 120.0
            CentralBody: Earth
            J2NormalizedValue: 0.000484165143790815
            RefDistance: 6378137.0
            OrbitEpoch: "2024-01-01T00:00:00.000Z"
            CoordSystem: Inertial
            CoordType: Classical
            OrbitalElements:
              - 6978137.0
              - 0.001
              - 55.0
              - 0.0
              - 0.0
              - 0.0
    expect: &compute_coverage_success_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - SatisfactionIntervalsWithNumberOfAssets
          - PercentCovered
          - AccessDurationDatas
          - GapDurationDatas
          - GlobalCoverageDatas
          - AssetAccessResults
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          SatisfactionIntervalsWithNumberOfAssets:
            kind: json_array
            min_length: 1
            items:
              kind: json_array
              min_length: 1
              items:
                kind: json_object
                required_fields:
                  - NumberOfAssets
                  - Start
                  - Stop
                  - Duration
                fields:
                  NumberOfAssets:
                    kind: json_number
                  Start:
                    kind: json_string
                  Stop:
                    kind: json_string
                  Duration:
                    kind: json_number
          PercentCovered:
            kind: json_number
          AccessDurationDatas:
            kind: json_array
            min_length: 1
            items: &duration_distribution
              kind: json_object
              required_fields:
                - Duration
                - PercentOver
                - PercentUnder
              fields:
                Duration:
                  kind: json_number
                PercentOver:
                  kind: json_number
                PercentUnder:
                  kind: json_number
          GapDurationDatas:
            kind: json_array
            min_length: 1
            items: *duration_distribution
          GlobalCoverageDatas:
            kind: json_array
          AssetAccessResults:
            kind: json_array
  asset_position_two_body:
    request:
      <<: *compute_coverage_base_request
      Assets:
        - <<: *compute_coverage_j2_asset
          Position:
            $type: TwoBody
            Start: "2024-01-01T00:00:00.000Z"
            Stop: "2024-01-01T01:00:00.000Z"
            Step: 120.0
            CentralBody: Earth
            OrbitEpoch: "2024-01-01T00:00:00.000Z"
            CoordSystem: Inertial
            CoordType: Classical
            OrbitalElements:
              - 6978137.0
              - 0.001
              - 55.0
              - 0.0
              - 0.0
              - 0.0
    expect: *compute_coverage_success_expect
  asset_position_sgp4:

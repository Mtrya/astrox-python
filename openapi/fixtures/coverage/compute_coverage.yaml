schema_version: 1
endpoint: /Coverage/ComputeCoverage
method: POST
openapi_operation_id: null
openapi_request_schema: CoverageInput
openapi_response_schema: CoverageOutput
branches:
  nominal:
    request: &compute_coverage_base_request
      Start: "2024-01-01T00:00:00.000Z"
      Stop: "2024-01-01T01:00:00.000Z"
      Step: 120.0
      Grid:
        $type: LatitudeBounds
        MinLatitude: -30.0
        MaxLatitude: 30.0
        Resolution: 30.0
        Height: 0.0
      Assets:
        - Name: Satellite/CoverageProbeJ2
          Position:
            $type: J2
            Start: "2024-01-01T00:00:00.000Z"
            Stop: "2024-01-01T01:00:00.000Z"
            Step: 120.0
            CentralBody: Earth
            J2NormalizedValue: 0.000484165143790815
            RefDistance: 6378137.0
            OrbitEpoch: "2024-01-01T00:00:00.000Z"
            CoordSystem: Inertial
            CoordType: Classical
            OrbitalElements:
              - 6978137.0
              - 0.001
              - 55.0
              - 0.0
              - 0.0
              - 0.0
    expect: &compute_coverage_success_expect
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - SatisfactionIntervalsWithNumberOfAssets
          - PercentCovered
          - AccessDurationDatas
          - GapDurationDatas
          - GlobalCoverageDatas
          - AssetAccessResults
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          SatisfactionIntervalsWithNumberOfAssets:
            kind: json_array
            min_length: 1
            items:
              kind: json_array
              min_length: 1
              items:
                kind: json_object
                required_fields:
                  - NumberOfAssets
                  - Start
                  - Stop
                  - Duration
                fields:
                  NumberOfAssets:
                    kind: json_number
                  Start:
                    kind: json_string
                  Stop:
                    kind: json_string
                  Duration:
                    kind: json_number
          PercentCovered:
            kind: json_number
          AccessDurationDatas:
            kind: json_array
            min_length: 1
            items: &duration_distribution
              kind: json_object
              required_fields:
                - Duration
                - PercentOver
                - PercentUnder
              fields:
                Duration:
                  kind: json_number
                PercentOver:
                  kind: json_number
                PercentUnder:
                  kind: json_number
          GapDurationDatas:
            kind: json_array
            min_length: 1
            items: *duration_distribution
          GlobalCoverageDatas:
            kind: json_array
          AssetAccessResults:
            kind: json_array
  grid_point_sensor_conic:
    request:
      <<: *compute_coverage_base_request
      GridPointSensor:
        $type: Conic
        innerHalfAngle: 0.0
        outerHalfAngle: 45.0
        minimumClockAngle: 0.0
        maximumClockAngle: 360.0
    expect: *compute_coverage_success_expect
  grid_point_sensor_rectangular:
    request:
      <<: *compute_coverage_base_request
      GridPointSensor:
        $type: Rectangular
        xHalfAngle: 45.0
        yHalfAngle: 45.0
    expect: *compute_coverage_success_expect
  grid_point_constraints_az_el_mask:
    request:
      <<: *compute_coverage_base_request
      GridPointConstraints:
        - $type: AzElMask
          MaxRange: 20000.0
          AzElMaskData:
            - 0.0
            - 0.0
            - 1.5707963267948966
            - 0.0
            - 3.141592653589793
            - 0.0
            - 4.71238898038469
            - 0.0
            - 6.283185307179586
            - 0.0
    expect:
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - PercentCovered
          - GlobalCoverageDatas
        fields:
          IsSuccess:
            kind: json_boolean
            const: false
          Message:
            kind: json_string
          PercentCovered:
            kind: json_number
          GlobalCoverageDatas:
            kind: json_array
  grid_point_constraints_range:
    request:
      <<: *compute_coverage_base_request
      GridPointConstraints:
        - $type: Range
          MinimumValue: 0.0
          MaximumValue: 20000.0
          IsMaximumEnabled: true
    expect: *compute_coverage_success_expect
  grid_point_constraints_elevation_angle:
    request:
      <<: *compute_coverage_base_request
      GridPointConstraints:
        - $type: ElevationAngle
          MinimumValue: 0.0
          IsMaximumEnabled: false
    expect: *compute_coverage_success_expect
  contain_asset_access_results_true:
    request:
      <<: *compute_coverage_base_request
      ContainAssetAccessResults: true
    expect:
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - AssetAccessResults
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          AssetAccessResults:
            kind: json_array
            min_length: 1
            items:
              kind: json_array
              min_length: 1
              items:
                kind: json_array
  contain_coverage_points_true:
    request:
      <<: *compute_coverage_base_request
      ContainCoveragePoints: true
    expect:
      status: 200
      content_type: application/json
      response:
        kind: json_object
        required_fields:
          - IsSuccess
          - Message
          - Points
        fields:
          IsSuccess:
            kind: json_boolean
            const: true
          Message:
            kind: json_string
          Points:
            kind: json_object
            required_fields:
              - CentralBodyName
              - GridPoints
              - Height
              - Type
            fields:
              CentralBodyName:
                kind: json_string
              GridPoints:
                kind: json_array
                min_length: 1
                items:
                  kind: json_object
                  required_fields:
                    - GridCellBoundaryVertices
                    - Position
                    - Weight
                  fields:
                    GridCellBoundaryVertices:
                      kind: json_array
                      min_length: 1
                      items:
                        kind: json_array
                        min_length: 1
                        items:
                          kind: json_number
                    Position:
                      kind: json_array
                      min_length: 1
                      items:
                        kind: json_number
                    Weight:
                      kind: json_number
              Height:
                kind: json_number
              Type:
                kind: json_string
  filter_type_at_least_n:
    request:
      <<: *compute_coverage_base_request
      FilterType: AtLeastN
      NumberOfAssets: 1
    expect: *compute_coverage_success_expect
  filter_type_exactly_n:
    request:
      <<: *compute_coverage_base_request
      FilterType: ExactlyN
      NumberOfAssets: 1
    expect: *compute_coverage_success_expect

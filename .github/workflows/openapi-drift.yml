name: OpenAPI Drift

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  drift:
    name: Compare live OpenAPI and generated models
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check live spec and generated model drift
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: uv run python scripts/check_openapi_drift.py

name: OpenAPI Drift Detection

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

concurrency:
  group: openapi-drift
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    name: Refresh OpenAPI drift artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare drift report directory
        run: |
          mkdir -p openapi-drift-reports
          cp openapi/astrox.openapi.yaml openapi-drift-reports/previous-openapi.yaml

      - name: Fetch live OpenAPI
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          set -o pipefail
          uv run python scripts/openapi_drift/fetch_openapi.py \
            --output openapi/astrox.openapi.yaml \
            --archive-dir openapi/archive \
            2>&1 | tee openapi-drift-reports/fetch-openapi.log

      - name: Build drift report
        id: pipeline
        run: |
          set -o pipefail
          git status --porcelain -- openapi > openapi-drift-reports/tracked-status.txt
          uv run python scripts/openapi_drift/drift_pipeline_report.py \
            --previous-openapi openapi-drift-reports/previous-openapi.yaml \
            --current-openapi openapi/astrox.openapi.yaml \
            --tracked-status openapi-drift-reports/tracked-status.txt \
            --json-output openapi-drift-reports/pipeline.json \
            --summary-output openapi-drift-reports/summary.md \
            --pr-body-output openapi-drift-reports/pr-body.md \
            --github-output "${GITHUB_OUTPUT}" \
            2>&1 | tee openapi-drift-reports/pipeline.log
          cat openapi-drift-reports/summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-drift-reports
          path: openapi-drift-reports/

      - name: Open drift pull request
        if: steps.pipeline.outputs.pr_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.ASTROX_AUTOMATION_TOKEN }}
        run: |
          branch="automation/openapi-drift"
          if [ -z "${GH_TOKEN}" ]; then
            echo "ASTROX_AUTOMATION_TOKEN is required to create drift PRs that trigger CI."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "${branch}:refs/remotes/origin/${branch}" || true
          git switch -c "${branch}"
          git add openapi/astrox.openapi.yaml openapi/archive
          git commit -m "Refresh ASTROX upstream drift data"
          git push --force-with-lease --set-upstream origin "${branch}"

          existing="$(gh pr list --state open --head "${branch}" --json number --jq '.[0].number // ""')"
          if [ -n "${existing}" ]; then
            gh pr edit "${existing}" \
              --title "${{ steps.pipeline.outputs.pr_title }}" \
              --body-file openapi-drift-reports/pr-body.md
            pr_number="${existing}"
          else
            gh pr create \
              --title "${{ steps.pipeline.outputs.pr_title }}" \
              --body-file openapi-drift-reports/pr-body.md \
              --head "${branch}"
            pr_number="$(gh pr list --state open --head "${branch}" --json number --jq '.[0].number')"
          fi

          gh pr merge "${pr_number}" --auto --squash

      - name: Report no drift
        if: steps.pipeline.outputs.pr_required != 'true'
        run: echo "No tracked OpenAPI drift was reported."

name: OpenAPI Drift Detection

on:
  schedule:
    - cron: "18 18 * * *"
  workflow_dispatch:

concurrency:
  group: openapi-drift
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  drift:
    name: Refresh OpenAPI, models, and fixture drift report
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Prepare drift report directory
        run: mkdir -p openapi-drift-reports

      - name: Fetch live OpenAPI
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          set -o pipefail
          uv run python scripts/openapi_drift/fetch_openapi.py \
            --output openapi/astrox.openapi.yaml \
            --archive-dir openapi/archive \
            2>&1 | tee openapi-drift-reports/fetch-openapi.log

      - name: Regenerate Pydantic models
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          set -o pipefail
          uv run python scripts/openapi_drift/generate_models.py \
            --input openapi/astrox.openapi.yaml \
            --output astrox/_models.py \
            --source "${ASTROX_BASE_URL}/openapi/v1.json" \
            --deterministic-header \
            2>&1 | tee openapi-drift-reports/generate-models.log

      - name: Reconcile existing fixtures
        id: reconcile
        timeout-minutes: 10
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          set -o pipefail
          uv run python scripts/openapi_drift/reconcile.py \
            --apply \
            --json-output openapi-drift-reports/reconcile.json \
            --markdown-output openapi-drift-reports/reconcile.md \
            2>&1 | tee openapi-drift-reports/reconcile.log

      - name: Generate discovery coverage report
        id: discovery
        timeout-minutes: 10
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          uv run python scripts/openapi_drift/discovery_report.py \
            --probe-blocked \
            --json-output openapi-drift-reports/discovery.json \
            --markdown-output openapi-drift-reports/discovery.md \
            > openapi-drift-reports/discovery.log 2>&1

      - name: Verify fixtures
        id: fixtures
        timeout-minutes: 10
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          set +e
          set -o pipefail
          uv run python scripts/openapi_drift/verify.py \
            2>&1 | tee openapi-drift-reports/verify-fixtures.log
          status="${PIPESTATUS[0]}"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Run focused drift checks
        id: focused
        continue-on-error: true
        run: |
          set -o pipefail
          {
            uv run python scripts/openapi_drift/normalize.py --fixture-dir openapi/fixtures --check
            uv run python scripts/openapi_drift/generate_status.py \
              --openapi openapi/astrox.openapi.yaml \
              --fixture-dir openapi/fixtures \
              --output openapi/fixtures/STATUS.md \
              --check
            uv run python -m pytest -q tests/test_openapi_fixtures.py tests/test_generate_models.py tests/test_models.py
          } 2>&1 | tee openapi-drift-reports/focused-checks.log

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: |
          set -o pipefail
          uv run python -m pytest tests \
            2>&1 | tee openapi-drift-reports/pytest.log

      - name: Build pipeline report
        id: pipeline
        if: always()
        run: |
          git status --porcelain -- openapi astrox/_models.py > openapi-drift-reports/tracked-status.txt
          uv run python scripts/openapi_drift/drift_pipeline_report.py \
            --reconcile-json openapi-drift-reports/reconcile.json \
            --discovery-json openapi-drift-reports/discovery.json \
            --tracked-status openapi-drift-reports/tracked-status.txt \
            --json-output openapi-drift-reports/pipeline.json \
            --summary-output openapi-drift-reports/summary.md \
            --pr-body-output openapi-drift-reports/pr-body.md \
            --issue-body-output openapi-drift-reports/issue-body.md \
            --github-output "${GITHUB_OUTPUT}" \
            --test-outcome fixture_verification=${{ steps.fixtures.outputs.status }} \
            --test-outcome focused=${{ steps.focused.outcome }} \
            --test-outcome pytest=${{ steps.pytest.outcome }} \
            > openapi-drift-reports/pipeline.log 2>&1
          cat openapi-drift-reports/summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: openapi-drift-reports
          path: openapi-drift-reports/

      - name: Open drift pull request
        if: steps.pipeline.outputs.pr_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/openapi-drift"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add openapi astrox/_models.py
          git commit -m "Refresh ASTROX upstream drift data"
          git push --force-with-lease --set-upstream origin "${branch}"

          existing="$(gh pr list --state open --head "${branch}" --json number --jq '.[0].number // ""')"
          if [ -n "${existing}" ]; then
            gh pr edit "${existing}" \
              --title "${{ steps.pipeline.outputs.pr_title }}" \
              --body-file openapi-drift-reports/pr-body.md
          else
            gh pr create \
              --title "${{ steps.pipeline.outputs.pr_title }}" \
              --body-file openapi-drift-reports/pr-body.md \
              --head "${branch}"
          fi

      - name: Create or update blocked-branch issue
        if: steps.pipeline.outputs.issue_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh issue list --state open --search 'in:title "${{ steps.pipeline.outputs.issue_title }}"' --json number --jq '.[0].number // ""')"
          if [ -n "${existing}" ]; then
            gh issue edit "${existing}" --body-file openapi-drift-reports/issue-body.md
          else
            gh issue create \
              --title "${{ steps.pipeline.outputs.issue_title }}" \
              --body-file openapi-drift-reports/issue-body.md
          fi

      - name: Report no drift
        if: steps.pipeline.outputs.pr_required != 'true' && steps.pipeline.outputs.issue_required != 'true'
        run: echo "No tracked drift and no reachable blocked branches were reported."

      - name: Fail when fixture verification fails
        if: steps.fixtures.outputs.status != '0'
        run: exit 1

      - name: Fail when tests fail
        if: steps.pytest.outcome != 'success'
        run: exit 1

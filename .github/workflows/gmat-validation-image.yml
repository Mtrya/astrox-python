name: GMAT Validation Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/containers/gmat-validation/**"
      - ".github/workflows/gmat-validation-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish GMAT validation image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .github/containers/gmat-validation
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/astrox-gmat-validation:gmat-r2026a

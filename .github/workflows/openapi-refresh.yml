name: Refresh OpenAPI and Models

on:
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Fetch latest OpenAPI and regenerate models
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Fetch live OpenAPI
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          uv run python scripts/fetch_openapi.py \
            --output openapi/astrox.openapi.yaml \
            --archive-dir openapi/archive

      - name: Regenerate Pydantic models
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          uv run python scripts/generate_models.py \
            --input openapi/astrox.openapi.yaml \
            --output astrox/_models.py \
            --source "${ASTROX_BASE_URL}/openapi/v1.json" \
            --deterministic-header

      - name: Run generated-model tests
        id: pytest
        continue-on-error: true
        run: uv run python -m pytest tests

      - name: Open refresh pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- openapi astrox/_models.py)" ]; then
            echo "OpenAPI baseline and generated models are already up to date."
            exit 0
          fi

          branch="automation/openapi-model-refresh-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add openapi astrox/_models.py
          git commit -m "Refresh ASTROX OpenAPI and generated models"
          git push --set-upstream origin "${branch}"

          if [ "${{ steps.pytest.outcome }}" = "success" ]; then
            test_note="Generated-model tests passed in the refresh workflow; auto-merge was requested."
          else
            test_note="Generated-model tests failed in the refresh workflow; this PR needs human follow-up on this branch."
          fi

          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          Automated refresh of the checked-in ASTROX OpenAPI baseline and generated Pydantic models.

          ${test_note}
          EOF

          pr_url="$(gh pr create \
            --title "Refresh ASTROX OpenAPI and generated models" \
            --body-file "${body_file}")"

          if [ "${{ steps.pytest.outcome }}" = "success" ]; then
            gh pr merge "${pr_url}" --auto --squash --delete-branch || \
              echo "Could not enable auto-merge; leaving PR open."
          fi

      - name: Fail when generated-model tests fail
        if: steps.pytest.outcome != 'success'
        run: exit 1

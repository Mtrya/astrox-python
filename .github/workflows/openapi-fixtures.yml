name: OpenAPI Fixtures

on:
  schedule:
    - cron: "19 3 * * *"
  workflow_dispatch:

jobs:
  verify:
    name: Verify upstream OpenAPI fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify fixtures
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: |
          uv run python scripts/openapi_fixtures/verify.py \
            --report artifacts/openapi-fixtures/report.json

      - name: Upload fixture report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: openapi-fixture-report
          path: artifacts/openapi-fixtures/report.json
          if-no-files-found: ignore


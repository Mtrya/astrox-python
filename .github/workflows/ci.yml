name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    name: Fast PR tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build --no-build-isolation

      - name: Verify built package import
        run: |
          WHEEL="$(pwd)/$(find dist -name 'astrox_python-*.whl' -print -quit)"
          cd /tmp
          uv run --no-project --with "$WHEEL" python - <<'PY'
          from astrox import orbits, propagator

          orbit = orbits.keplerian(
              semi_major_axis_m=7000000.0,
              eccentricity=0.001,
              inclination_deg=98.0,
              raan_deg=20.0,
              argument_of_periapsis_deg=30.0,
              true_anomaly_deg=40.0,
          )

          assert orbit.to_wire()[0] == 7000000.0
          assert hasattr(propagator, "j2")
          assert hasattr(propagator, "two_body")
          PY

      - name: Check propagation example syntax
        run: uv run python -m py_compile examples/01_propagation/*.py tests/validation/_support/*.py tests/validation/_external/gmat/*.py tests/validation/sdk_contract/propagator/test_*.py tests/validation/cross_validation/propagator/test_*.py .github/containers/gmat-validation/self_check.py

      - name: Run pytest
        run: uv run python -m pytest tests --ignore=tests/validation

  live-smoke:
    name: Live smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check live OpenAPI and direct endpoint route
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: uv run python scripts/live_smoke.py

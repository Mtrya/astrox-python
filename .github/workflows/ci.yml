name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    name: Fast PR tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build --no-build-isolation

      - name: Verify built package import
        run: |
          WHEEL="$(pwd)/$(find dist -name 'astrox_python-*.whl' -print -quit)"
          cd /tmp
          uv run --no-project --with "$WHEEL" python - <<'PY'
          import importlib
          import pkgutil

          import astrox

          public_modules = [
              module.name
              for module in pkgutil.iter_modules(astrox.__path__)
              if not module.name.startswith("_")
          ]
          assert public_modules
          for module_name in public_modules:
              importlib.import_module(f"astrox.{module_name}")

          assert hasattr(astrox, "configure")
          assert hasattr(astrox, "raw")
          PY

      - name: Run examples (live server smoke)
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'workflow_dispatch'
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: uv run python scripts/run_examples.py

      - name: Check examples syntax
        if: github.event_name == 'pull_request'
        run: uv run python -m compileall -q examples

      - name: Check validation syntax
        run: uv run python -m compileall -q tests/validation .github/containers/gmat-validation

      - name: Run pytest (PR - fast check)
        if: github.event_name == 'pull_request'
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: uv run python -m pytest tests --ignore=tests/validation/cross_validation

      - name: Run pytest (push to main - full)
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'workflow_dispatch'
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: uv run python -m pytest tests

  live-smoke:
    name: Live smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check live OpenAPI and direct endpoint route
        env:
          ASTROX_BASE_URL: http://astrox.cn:8765
        run: uv run python scripts/live_smoke.py

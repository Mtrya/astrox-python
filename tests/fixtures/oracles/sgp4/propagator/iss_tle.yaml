area: propagator
source:
  name: skyfield
  version: '1.54'
scope: SGP4 period and first two GCRS Cartesian state samples for one ISS TLE case. This calibrates ASTROX reference_frame=INERTIAL as GCRF/GCRS-like for this case, not raw TEME.
cases:
- id: iss_tle
  kind: sgp4_state_samples
  astrox_contract:
    path: propagator/sgp4/nominal.yaml
    case: iss_tle
  tolerance:
    period_abs_s: 1.0e-09
    position_abs_m: 0.02
    velocity_abs_m_s: 2.0e-05
  oracle:
    period_s: 5578.082396699645
    samples:
    - offset_s: 0.0
      position_m:
      - 6367734.32305353
      - -2380661.2220777776
      - -13622.064612639613
      velocity_m_s:
      - 1669.5776049498695
      - 4453.97464105254
      - 6005.161259397161
    - offset_s: 300.0
      position_m:
      - 6498410.017085208
      - -934945.2269248704
      - 1754447.5334221972
      velocity_m_s:
      - -806.9758071523105
      - 5092.153438048114
      - 5669.058849354532
  notes:
  - Oracle state samples were generated with skyfield.api.EarthSatellite.at(...) and load.timescale(builtin=True) for 2024-01-01T00:00:00Z and 2024-01-01T00:05:00Z.
  - Direct sgp4.api.Satrec TEME output differs from ASTROX by tens of kilometers for this case; applying Skyfield's satellite-to-GCRS transform reduces the checked ASTROX snapshot error below 0.01 m and 0.00001 m/s.
